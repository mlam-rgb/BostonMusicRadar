<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upcoming Events | Boston Music Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="events">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <span class="brand-white">BOSTON</span>
        <span class="brand-red">MUSIC RADAR</span>
      </a>

      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="events.html" class="active">Upcoming Events</a>
        <a href="venues.html">Venues</a>
        <a href="add-event.html">Add Event</a>
      </nav>

      <div class="header-actions">
        <button class="btn btn-red btn-small">Log In</button>
        <button class="btn btn-outline btn-small">Sign Up</button>
      </div>

      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
        ☰
      </button>
    </div>

    <div class="mobile-nav" id="mobileNav">
      <a href="index.html">Home</a>
      <a href="events.html" class="active">Upcoming Events</a>
      <a href="venues.html">Venues</a>
      <a href="add-event.html">Add Event</a>
    </div>
  </header>

  <main class="page-shell">
    <section class="page-hero page-hero-small">
      <div class="container">
        <h1>Upcoming Events</h1>
        <p>Real shows in Boston over the next two weeks.</p>
      </div>
    </section>

    <section class="page-content">
      <div class="container">
        <div class="filters-card">
          <div class="filters-grid">
            <input type="text" id="eventsSearchInput" placeholder="Search artist or venue..." />
            <select id="eventsGenreSelect"></select>
            <select id="eventsDateSelect">
              <option value="all">All Dates</option>
              <option value="7">Next 7 Days</option>
              <option value="14" selected>Next 14 Days</option>
              <option value="30">Next 30 Days</option>
            </select>
          </div>
        </div>

        <div id="allEventsContainer"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-links">
        <a href="venues.html">About</a>
        <a href="add-event.html">Contact</a>
        <a href="venues.html">For Businesses</a>
      </div>

      <div class="footer-right">
        <p>© 2026 Boston Music Radar. All rights reserved.</p>
        <div class="socials">
          <a href="#" aria-label="Facebook">f</a>
          <a href="#" aria-label="Instagram">◎</a>
          <a href="#" aria-label="X">𝕏</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
